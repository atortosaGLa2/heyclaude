<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heyclaude</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #8892a4;
    --success: #4ade80;
    --error: #f87171;
    --glow: rgba(233, 69, 96, 0.35);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 24px;
    min-width: 300px;
    max-width: 400px;
  }

  .canvas-wrap {
    position: relative;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 0 30px var(--glow), 0 4px 24px rgba(0,0,0,0.4);
    /* transition is set in enhanced state transitions section */
  }

  canvas {
    display: block;
    border-radius: 8px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .info {
    text-align: center;
    width: 100%;
  }

  .animal-name {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-transform: capitalize;
  }

  .state-label {
    font-size: 0.95rem;
    color: var(--text-dim);
    transition: color 0.3s ease, opacity 0.3s ease;
    min-height: 1.4em;
  }

  .state-label.active {
    color: var(--accent);
  }

  .spinner {
    display: inline-block;
    margin-right: 4px;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .progress-wrap.visible { opacity: 1; }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Connection indicator */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    transition: background 0.3s ease;
  }

  .status-dot.connected { background: var(--success); }

  .tool-label {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    opacity: 0.7;
    min-height: 1.2em;
    transition: opacity 0.3s ease;
  }

  /* Speech bubble - shows on waiting state */
  .speech-bubble {
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffaa44;
    color: #1a1a2e;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
    z-index: 10;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid #ffaa44;
  }
  .speech-bubble.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(-5px);
  }
  .typing-dots span {
    animation: blink 1.4s infinite;
    animation-fill-mode: both;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  /* Waiting state - pulsing amber glow */
  .canvas-wrap.state-waiting {
    animation: pulseGlow 2s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 170, 68, 0.3), 0 0 30px rgba(255, 170, 68, 0.1); }
    50% { box-shadow: 0 0 25px rgba(255, 170, 68, 0.6), 0 0 50px rgba(255, 170, 68, 0.2); }
  }

  /* Error/success/sleeping states are defined in enhanced state transitions below */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* Coding and executing states are defined in enhanced state transitions below */

  /* Notification bell for waiting */
  .notification-bell {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 1.2rem;
    opacity: 0;
    transition: opacity 0.3s ease;
    animation: bellRing 1s ease-in-out infinite;
  }
  .notification-bell.visible { opacity: 1; }
  @keyframes bellRing {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(15deg); }
    40% { transform: rotate(-15deg); }
    60% { transform: rotate(8deg); }
    80% { transform: rotate(-8deg); }
  }

  /* ── Confetti system ──────────────────────────────────────────────────── */
  .confetti-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
  }
  .confetti-container.active { opacity: 1; }
  .confetti {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 2px;
    top: -10px;
  }
  @keyframes confettiFall0 { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(320px) rotate(720deg); opacity: 0; } }
  @keyframes confettiFall1 { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(350px) rotate(-540deg); opacity: 0; } }
  @keyframes confettiFall2 { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(300px) rotate(480deg); opacity: 0; } }
  @keyframes confettiFall3 { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(340px) rotate(-660deg); opacity: 0; } }
  @keyframes confettiFall4 { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(310px) rotate(600deg); opacity: 0; } }

  /* ── Background effects per state ─────────────────────────────────────── */
  .bg-effect {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: 16px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 0;
  }
  .bg-effect.active { opacity: 1; }

  /* Coding: faint code rain */
  .bg-coding::before, .bg-coding::after {
    content: '0 1 0 1 1 0 1 0 0 1';
    position: absolute;
    font-family: monospace;
    font-size: 10px;
    color: #22cc66;
    opacity: 0.05;
    white-space: nowrap;
    animation: codeRain 4s linear infinite;
  }
  .bg-coding::before { left: 15%; top: -20px; animation-delay: 0s; }
  .bg-coding::after { left: 55%; top: -20px; animation-delay: 2s; }
  @keyframes codeRain {
    0% { transform: translateY(-20px); opacity: 0; }
    10% { opacity: 0.05; }
    90% { opacity: 0.05; }
    100% { transform: translateY(280px); opacity: 0; }
  }

  /* Executing: pulsing concentric amber rings */
  .bg-executing::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 40px; height: 40px;
    border: 2px solid rgba(255, 170, 34, 0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ringPulse 2s ease-out infinite;
  }
  .bg-executing::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 40px; height: 40px;
    border: 2px solid rgba(255, 170, 34, 0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ringPulse 2s ease-out infinite 1s;
  }
  @keyframes ringPulse {
    0% { width: 40px; height: 40px; opacity: 0.3; }
    100% { width: 260px; height: 260px; opacity: 0; }
  }

  /* Thinking: slowly rotating gradient halo */
  .bg-thinking::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 240px; height: 240px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      rgba(139, 92, 246, 0) 0deg,
      rgba(139, 92, 246, 0.08) 90deg,
      rgba(139, 92, 246, 0) 180deg,
      rgba(139, 92, 246, 0.08) 270deg,
      rgba(139, 92, 246, 0) 360deg
    );
    animation: haloRotate 6s linear infinite;
  }
  @keyframes haloRotate {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* Searching: scanning line effect */
  .bg-searching::before {
    content: '';
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.2), transparent);
    animation: scanLine 2s ease-in-out infinite;
  }
  @keyframes scanLine {
    0%, 100% { top: 10%; }
    50% { top: 90%; }
  }

  /* ── Trail / afterimage effect ────────────────────────────────────────── */
  .afterimage {
    position: absolute;
    top: 16px; left: 16px;
    pointer-events: none;
    opacity: 0;
    filter: blur(3px);
    transition: opacity 0.35s ease-out;
    z-index: 1;
  }
  .afterimage.flash {
    opacity: 0.3;
  }

  /* ── Enhanced state transitions ───────────────────────────────────────── */
  .canvas-wrap {
    transition: box-shadow 0.5s ease, filter 0.3s ease, transform 0.3s ease;
  }
  .canvas-wrap.state-coding {
    box-shadow: 0 0 20px rgba(124, 106, 247, 0.4), 0 0 40px rgba(124, 106, 247, 0.15);
    filter: brightness(1.02);
  }
  .canvas-wrap.state-executing {
    box-shadow: 0 0 20px rgba(255, 170, 34, 0.4), 0 0 40px rgba(255, 170, 34, 0.15);
    filter: brightness(1.03);
  }
  .canvas-wrap.state-thinking {
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.4), 0 0 40px rgba(139, 92, 246, 0.15);
    filter: brightness(1.01);
  }
  .canvas-wrap.state-searching {
    box-shadow: 0 0 20px rgba(249, 115, 22, 0.4), 0 0 40px rgba(249, 115, 22, 0.15);
    filter: brightness(1.02);
  }
  .canvas-wrap.state-success {
    box-shadow: 0 0 25px rgba(255, 204, 51, 0.5), 0 0 50px rgba(255, 204, 51, 0.2);
    filter: brightness(1.08);
    transform: scale(1.02);
  }
  .canvas-wrap.state-error {
    animation: shake 0.5s ease-in-out;
    box-shadow: 0 0 25px rgba(255, 68, 68, 0.5), 0 0 45px rgba(255, 68, 68, 0.2);
    filter: brightness(1.05) saturate(1.2);
  }
  .canvas-wrap.state-sleeping {
    opacity: 0.7;
    filter: brightness(0.75) saturate(0.8);
    transform: scale(0.98);
  }

  /* ── Interactive hover effects ────────────────────────────────────────── */
  .canvas-wrap:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
    cursor: pointer;
  }
  .canvas-wrap.state-sleeping:hover {
    opacity: 0.85;
    transform: scale(1.02);
  }
  .state-tooltip {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 30;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .canvas-wrap:hover .state-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="container">
  <div class="canvas-wrap" id="canvasWrap">
    <div class="bg-effect" id="bgEffect"></div>
    <canvas id="afterimage" class="afterimage" width="256" height="256"></canvas>
    <canvas id="sprite" width="256" height="256" style="position:relative;z-index:2;"></canvas>
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="notification-bell" id="notificationBell">🔔</div>
    <div class="state-tooltip" id="stateTooltip">idle</div>
  </div>
  <div class="speech-bubble" id="speechBubble">
    <span>Hey! Your turn</span>
    <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
  </div>

  <div class="info">
    <div class="animal-name" id="animalName">loading...</div>
    <div class="state-label" id="stateLabel"></div>
    <div class="tool-label" id="toolLabel"></div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Configuration ────────────────────────────────────────────────────────

  // Web UI is served by the daemon — use relative URLs
  const DAEMON_URL = window.location.origin;
  const WS_PORT = parseInt(new URLSearchParams(window.location.search).get('ws') || '7338');
  const WS_URL = `ws://${window.location.hostname}:${WS_PORT}`;
  const PIXEL_SCALE = 16;  // 16x16 sprite at 16x = 256x256 canvas
  const RECONNECT_DELAY = 2000;

  // ── DOM refs ─────────────────────────────────────────────────────────────

  const canvas = document.getElementById('sprite');
  const ctx = canvas.getContext('2d');
  const canvasWrap = document.getElementById('canvasWrap');
  const animalNameEl = document.getElementById('animalName');
  const stateLabelEl = document.getElementById('stateLabel');
  const toolLabelEl = document.getElementById('toolLabel');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const speechBubble = document.getElementById('speechBubble');
  const bell = document.getElementById('notificationBell');
  const confettiContainer = document.getElementById('confettiContainer');
  const bgEffect = document.getElementById('bgEffect');
  const afterimageCanvas = document.getElementById('afterimage');
  const afterCtx = afterimageCanvas.getContext('2d');
  const stateTooltip = document.getElementById('stateTooltip');

  // ── State ────────────────────────────────────────────────────────────────

  let sprites = null;        // all sprite data from /sprites
  let frameSpeeds = {};      // ms per frame per state
  let stateLabels = {};      // display labels per state
  let currentAnimal = '';
  let currentState = 'idle';
  let currentLabel = '';
  let frameIndex = 0;
  let lastFrameTime = 0;
  let wsConnected = false;
  let ws = null;
  let spinnerIndex = 0;
  let progressValue = 0;

  const SPINNERS = ['\u280B', '\u2819', '\u2839', '\u2838', '\u283C', '\u2834', '\u2826', '\u2827', '\u2807', '\u280F'];

  // State-based glow colors
  const STATE_COLORS = {
    idle:      'rgba(233, 69, 96, 0.25)',
    thinking:  'rgba(139, 92, 246, 0.4)',
    coding:    'rgba(59, 130, 246, 0.4)',
    reading:   'rgba(234, 179, 8, 0.35)',
    searching: 'rgba(249, 115, 22, 0.4)',
    browsing:  'rgba(6, 182, 212, 0.4)',
    executing: 'rgba(16, 185, 129, 0.4)',
    planning:  'rgba(139, 92, 246, 0.35)',
    waiting:   'rgba(156, 163, 175, 0.3)',
    success:   'rgba(74, 222, 128, 0.5)',
    error:     'rgba(248, 113, 113, 0.5)',
    mcp:       'rgba(168, 85, 247, 0.4)',
    skill:     'rgba(251, 191, 36, 0.4)',
    sleeping:  'rgba(100, 116, 139, 0.2)',
    greeting:  'rgba(251, 191, 36, 0.45)',
  };

  // Active states that show spinner
  const ACTIVE_STATES = new Set([
    'thinking', 'coding', 'reading', 'searching', 'browsing',
    'executing', 'planning', 'mcp', 'skill',
  ]);

  // ── Fetch sprite data ────────────────────────────────────────────────────

  async function fetchSprites() {
    try {
      const res = await fetch(`${DAEMON_URL}/sprites`);
      const data = await res.json();
      sprites = data.sprites;
      frameSpeeds = data.frameSpeeds || {};
      stateLabels = data.stateLabels || {};
    } catch (e) {
      console.warn('Failed to fetch sprites, retrying in 3s...', e);
      setTimeout(fetchSprites, 3000);
    }
  }

  // ── WebSocket ────────────────────────────────────────────────────────────

  function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      wsConnected = true;
      statusDot.classList.add('connected');
      statusText.textContent = 'connected';
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.animal && msg.animal !== currentAnimal) {
          currentAnimal = msg.animal;
          animalNameEl.textContent = msg.animal;
        }
        if (msg.state && msg.state !== currentState) {
          currentState = msg.state;
          frameIndex = 0;
          lastFrameTime = 0;
          updateGlow();
          updateProgress();
        }
        if (msg.label !== undefined) {
          currentLabel = msg.label;
        }
        updateLabels();
      } catch (e) {
        console.warn('Bad WS message:', e);
      }
    };

    ws.onclose = () => {
      wsConnected = false;
      statusDot.classList.remove('connected');
      statusText.textContent = 'reconnecting...';
      setTimeout(connectWS, RECONNECT_DELAY);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  // ── UI updates ───────────────────────────────────────────────────────────

  function updateLabels() {
    const label = stateLabels[currentState] || currentState;
    const isActive = ACTIVE_STATES.has(currentState);

    if (isActive) {
      const spin = SPINNERS[spinnerIndex % SPINNERS.length];
      stateLabelEl.innerHTML = `<span class="spinner">${spin}</span>${label}`;
      stateLabelEl.classList.add('active');
    } else {
      stateLabelEl.textContent = label;
      stateLabelEl.classList.remove('active');
    }

    toolLabelEl.textContent = currentLabel || '';
  }

  function updateGlow() {
    // Apply state-specific CSS class for visual effects
    canvasWrap.className = 'canvas-wrap state-' + currentState;

    // For states without dedicated CSS classes, apply inline glow
    const statesWithCSSClass = new Set(['waiting', 'error', 'success', 'sleeping', 'coding', 'executing']);
    if (!statesWithCSSClass.has(currentState)) {
      const color = STATE_COLORS[currentState] || STATE_COLORS.idle;
      canvasWrap.style.boxShadow = `0 0 30px ${color}, 0 4px 24px rgba(0,0,0,0.4)`;
    } else {
      canvasWrap.style.boxShadow = '';
    }

    // Show/hide speech bubble and notification bell for waiting state
    if (currentState === 'waiting') {
      speechBubble.classList.add('visible');
      if (bell) bell.classList.add('visible');
    } else {
      speechBubble.classList.remove('visible');
      if (bell) bell.classList.remove('visible');
    }
  }

  function updateProgress() {
    if (ACTIVE_STATES.has(currentState)) {
      progressWrap.classList.add('visible');
      progressValue = 0;
    } else if (currentState === 'success') {
      progressBar.style.width = '100%';
      setTimeout(() => {
        progressWrap.classList.remove('visible');
        progressValue = 0;
        progressBar.style.width = '0%';
      }, 1200);
    } else {
      progressWrap.classList.remove('visible');
      progressValue = 0;
      progressBar.style.width = '0%';
    }
  }

  // ── Confetti system ──────────────────────────────────────────────────

  const CONFETTI_COLORS = ['#ffcc33', '#ff6b8a', '#7c6af7', '#22cc66', '#44ccff'];
  let confettiTimeout = null;

  function spawnConfetti() {
    confettiContainer.innerHTML = '';
    const count = 25;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      const color = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
      const left = Math.random() * 100;
      const animIndex = i % 5;
      const delay = Math.random() * 0.6;
      const duration = 1.2 + Math.random() * 0.8;
      piece.style.cssText = `
        background: ${color};
        left: ${left}%;
        width: ${4 + Math.random() * 5}px;
        height: ${4 + Math.random() * 5}px;
        animation: confettiFall${animIndex} ${duration}s ease-out ${delay}s forwards;
      `;
      confettiContainer.appendChild(piece);
    }
    confettiContainer.classList.add('active');
    if (confettiTimeout) clearTimeout(confettiTimeout);
    confettiTimeout = setTimeout(() => {
      confettiContainer.classList.remove('active');
      setTimeout(() => { confettiContainer.innerHTML = ''; }, 300);
    }, 2000);
  }

  // ── Background effects ──────────────────────────────────────────────

  const BG_EFFECT_STATES = new Set(['coding', 'executing', 'thinking', 'searching']);
  let currentBgClass = '';

  function updateBgEffect() {
    if (BG_EFFECT_STATES.has(currentState)) {
      if (currentBgClass) bgEffect.classList.remove(currentBgClass);
      currentBgClass = 'bg-' + currentState;
      bgEffect.classList.add(currentBgClass);
      bgEffect.classList.add('active');
    } else {
      bgEffect.classList.remove('active');
      if (currentBgClass) {
        bgEffect.classList.remove(currentBgClass);
        currentBgClass = '';
      }
    }
  }

  // ── Trail / afterimage ──────────────────────────────────────────────

  function flashAfterimage() {
    afterCtx.clearRect(0, 0, afterimageCanvas.width, afterimageCanvas.height);
    afterCtx.drawImage(canvas, 0, 0);
    afterimageCanvas.classList.add('flash');
    setTimeout(() => { afterimageCanvas.classList.remove('flash'); }, 350);
  }

  // ── Hover tooltip ───────────────────────────────────────────────────

  canvasWrap.addEventListener('mouseenter', () => {
    const label = stateLabels[currentState] || currentState;
    stateTooltip.textContent = label;
  });

  // ── Rendering ────────────────────────────────────────────────────────────

  function drawFrame(spriteData, palette, frame) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < frame.length; y++) {
      const row = frame[y];
      for (let x = 0; x < row.length; x++) {
        const ch = row[x];
        if (ch === '0') continue; // transparent

        const colorIndex = parseInt(ch, 16) - 1;
        if (colorIndex >= 0 && colorIndex < palette.length) {
          ctx.fillStyle = palette[colorIndex];
          ctx.fillRect(x * PIXEL_SCALE, y * PIXEL_SCALE, PIXEL_SCALE, PIXEL_SCALE);
        }
      }
    }
  }

  function animate(timestamp) {
    requestAnimationFrame(animate);

    if (!sprites || !currentAnimal) return;

    const spriteData = sprites[currentAnimal] || sprites['claude'] || Object.values(sprites)[0];
    if (!spriteData) return;

    const frames = spriteData.states[currentState] || spriteData.states.idle;
    if (!frames || frames.length === 0) return;

    const speed = frameSpeeds[currentState] || 400;

    if (timestamp - lastFrameTime >= speed) {
      lastFrameTime = timestamp;
      frameIndex = (frameIndex + 1) % frames.length;
      drawFrame(spriteData, spriteData.palette, frames[frameIndex]);

      // Update spinner
      spinnerIndex++;
      updateLabels();

      // Animate progress bar
      if (ACTIVE_STATES.has(currentState)) {
        progressValue = Math.min(progressValue + (2 + Math.random() * 3), 90);
        progressBar.style.width = progressValue + '%';
      }
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  async function init() {
    // Draw a loading placeholder
    ctx.fillStyle = '#2a2a4a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#8892a4';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('loading...', canvas.width / 2, canvas.height / 2);

    await fetchSprites();
    connectWS();
    updateGlow();
    requestAnimationFrame(animate);
  }

  init();
})();
</script>
</body>
</html>
