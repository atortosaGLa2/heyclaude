<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>heyclaude</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #0a0a14;
    display: flex; justify-content: center; align-items: center;
    user-select: none; cursor: grab;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  .card {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 6px; padding: 12px 10px 8px;
    background: rgba(18,18,30,0.97);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    -webkit-app-region: drag;
    width: 90vw; max-width: 220px;
    position: relative;
  }
  canvas {
    display: block;
    image-rendering: pixelated; image-rendering: crisp-edges;
    width: 96px; height: 96px;
    transition: filter 0.4s ease;
  }
  .animal-name { font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; }
  .state-label { font-size: 9px; color: rgba(255,255,255,0.35); min-height: 12px; }
  .speech-bubble {
    position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
    background: #ffaa44; color: #1a1a2e;
    padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 700;
    white-space: nowrap; opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
  }
  .speech-bubble::after {
    content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid #ffaa44;
  }
  .speech-bubble.visible { opacity: 1; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  @keyframes pulse  { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .bounce { animation: bounce 0.35s ease; }
  .shake  { animation: shake 0.4s ease-in-out; }
  .pulse  { animation: pulse 3s ease-in-out infinite; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="speech-bubble" id="bubble">Your turn!</div>
  <canvas id="canvas" width="16" height="16"></canvas>
  <div class="animal-name" id="animalName">heyclaude</div>
  <div class="state-label" id="stateLabel">connecting...</div>
</div>
<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var card = document.getElementById('card');
var animalName = document.getElementById('animalName');
var stateLabel = document.getElementById('stateLabel');
var bubble = document.getElementById('bubble');

var params = new URLSearchParams(window.location.search);
var HTTP_PORT = params.get('daemonPort') || '7337';
var WS_PORT = params.get('wsPort') || '7338';
var BASE = 'http://localhost:' + HTTP_PORT;

var sprites = null;
var animal = '';
var state = 'idle';
var frameIdx = 0;
var lastTime = 0;

var GLOW = {
  idle:'rgba(233,69,96,0.3)', thinking:'rgba(139,92,246,0.55)',
  coding:'rgba(59,130,246,0.55)', reading:'rgba(234,179,8,0.45)',
  searching:'rgba(249,115,22,0.55)', browsing:'rgba(6,182,212,0.55)',
  executing:'rgba(16,185,129,0.55)', planning:'rgba(139,92,246,0.45)',
  waiting:'rgba(255,170,68,0.65)', success:'rgba(74,222,128,0.65)',
  error:'rgba(248,113,113,0.65)', sleeping:'rgba(100,116,139,0.25)',
  greeting:'rgba(251,191,36,0.55)'
};

function dbg(msg) { stateLabel.textContent = msg; }

function setAnimal(a) {
  animal = a;
  animalName.textContent = a;
  var sd = sprites && sprites[a];
  if (sd && sd.states && sd.states.idle && sd.states.idle[0]) {
    canvas.width  = sd.states.idle[0][0].length;
    canvas.height = sd.states.idle[0].length;
  }
}

function setState(s) {
  state = s; frameIdx = 0; lastTime = 0;
  stateLabel.textContent = s;
  canvas.style.filter = 'drop-shadow(0 0 12px ' + (GLOW[s] || GLOW.idle) + ')';
  card.classList.remove('bounce','shake','pulse');
  void card.offsetWidth;
  if (s === 'error') card.classList.add('shake');
  else if (s === 'sleeping') card.classList.add('pulse');
  else card.classList.add('bounce');
  bubble.classList.toggle('visible', s === 'waiting');
}

function drawFrame(frames) {
  var sd = sprites[animal];
  if (!sd) return;
  var frame = frames[frameIdx % frames.length];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var y = 0; y < frame.length; y++) {
    var row = frame[y];
    for (var x = 0; x < row.length; x++) {
      var ch = row[x];
      if (ch === '0') continue;
      var ci = parseInt(ch, 16) - 1;
      if (ci >= 0 && ci < sd.palette.length) {
        ctx.fillStyle = sd.palette[ci];
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }
}

function tick(ts) {
  requestAnimationFrame(tick);
  if (!sprites || !animal) return;
  var sd = sprites[animal] || Object.values(sprites)[0];
  if (!sd) return;
  var frames = (sd.states && (sd.states[state] || sd.states.idle));
  if (!frames || !frames.length) return;
  if (ts - lastTime >= 400) {
    lastTime = ts;
    frameIdx = (frameIdx + 1) % frames.length;
    drawFrame(frames);
  }
}

function connectWS() {
  var ws = new WebSocket('ws://localhost:' + WS_PORT);
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.animal && msg.animal !== animal) setAnimal(msg.animal);
      if (msg.state) setState(msg.state);
    } catch(err) {}
  };
  ws.onopen  = function() { if (!animal) dbg('connected'); };
  ws.onclose = function() { setTimeout(connectWS, 2000); };
  ws.onerror = function() { ws.close(); };
}

function loadStatus() {
  return fetch(BASE + '/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.animal) setAnimal(d.animal);
      if (d.state)  setState(d.state);
    })
    .catch(function(e) { dbg('status err: ' + e.message); });
}

function loadSprites() {
  dbg('loading...');
  fetch(BASE + '/sprites')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      sprites = d.sprites;
      dbg('sprites ok');
      return loadStatus();
    })
    .then(function() {
      connectWS();
      requestAnimationFrame(tick);
    })
    .catch(function(e) {
      dbg('err: ' + e.message);
      setTimeout(loadSprites, 3000);
    });
}

// draw test square immediately to verify canvas works
ctx.fillStyle = '#e94560';
ctx.fillRect(0, 0, 8, 8);
ctx.fillStyle = '#8b5cf6';
ctx.fillRect(8, 0, 8, 8);
ctx.fillStyle = '#3b82f6';
ctx.fillRect(0, 8, 8, 8);
ctx.fillStyle = '#10b981';
ctx.fillRect(8, 8, 8, 8);

// Force exact window size (Edge may ignore --window-size flag)
window.resizeTo(164, 260);

canvas.style.filter = 'drop-shadow(0 0 10px rgba(233,69,96,0.3))';
loadSprites();
</script>
</body>
</html>
